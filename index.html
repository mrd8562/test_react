<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Тренажёр по тесту</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f4f6f8;
            color: #1f2937;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 24px;
        }

        .panel,
        .question-card,
        .result-card {
            background: #fff;
            border-radius: 18px;
            box-shadow: 0 4px 18px rgba(0, 0, 0, 0.08);
            padding: 24px;
            margin-bottom: 20px;
        }

        h1,
        h2,
        h3 {
            margin-top: 0;
        }

        .muted {
            color: #6b7280;
        }

        .top-row,
        .stats,
        .actions,
        .nav {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
        }

        .stats-box {
            flex: 1 1 180px;
            background: #f8fafc;
            border-radius: 14px;
            padding: 16px;
            border: 1px solid #e5e7eb;
        }

        .stats-box .label {
            font-size: 14px;
            color: #6b7280;
        }

        .stats-box .value {
            margin-top: 6px;
            font-size: 24px;
            font-weight: bold;
        }

        .progress-wrap {
            margin-top: 18px;
        }

        .progress-bar {
            width: 100%;
            height: 12px;
            background: #e5e7eb;
            border-radius: 999px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: #2563eb;
            width: 0%;
            transition: width 0.2s ease;
        }

        .question-title {
            font-size: 24px;
            line-height: 1.45;
            margin-bottom: 18px;
        }

        .option {
            display: block;
            border: 1px solid #d1d5db;
            border-radius: 14px;
            padding: 14px 16px;
            margin-bottom: 12px;
            cursor: pointer;
            transition: 0.2s ease;
            background: #fff;
        }

        .option:hover {
            background: #f9fafb;
        }

        .option input {
            margin-right: 10px;
        }

        .option.selected {
            border-color: #111827;
            background: #f3f4f6;
        }

        .option.correct {
            border-color: #16a34a;
            background: #dcfce7;
        }

        .option.wrong {
            border-color: #dc2626;
            background: #fee2e2;
        }

        .feedback {
            margin-top: 16px;
            border-radius: 14px;
            padding: 16px;
            font-size: 15px;
        }

        .feedback.good {
            background: #dcfce7;
            color: #166534;
        }

        .feedback.bad {
            background: #fee2e2;
            color: #991b1b;
        }

        button {
            border: none;
            border-radius: 12px;
            padding: 12px 16px;
            background: #2563eb;
            color: white;
            font-size: 15px;
            cursor: pointer;
            transition: 0.2s ease;
        }

        button:hover {
            opacity: 0.92;
        }

        button.secondary {
            background: white;
            color: #111827;
            border: 1px solid #d1d5db;
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .badge {
            display: inline-block;
            padding: 6px 10px;
            border-radius: 999px;
            font-size: 13px;
            font-weight: bold;
        }

        .badge.ok {
            background: #dcfce7;
            color: #166534;
        }

        .badge.err {
            background: #fee2e2;
            color: #991b1b;
        }

        .result-answer {
            margin-top: 10px;
            padding: 14px;
            border-radius: 12px;
            background: #f8fafc;
            border: 1px solid #e5e7eb;
            line-height: 1.5;
        }

        .hidden {
            display: none;
        }

        @media (max-width: 640px) {
            .container {
                padding: 14px;
            }

            .question-title {
                font-size: 20px;
            }

            .panel,
            .question-card,
            .result-card {
                padding: 18px;
            }

            .top-row,
            .stats,
            .actions,
            .nav {
                flex-direction: column;
                align-items: stretch;
            }

            button {
                width: 100%;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <div id="quizScreen">
            <div class="panel">
                <div class="top-row">
                    <div>
                        <h1>Тренажёр по тесту</h1>
                        <div class="muted">Один вопрос на экран, случайный порядок, мгновенная проверка и экран ошибок в
                            конце.</div>
                    </div>
                    <div class="actions">
                        <button class="secondary" id="toggleInstant">Мгновенная проверка: вкл</button>
                        <button class="secondary" id="shuffleBtn">Перемешать заново</button>
                        <button class="secondary" id="resetBtn">Сбросить</button>
                    </div>
                </div>

                <div class="stats" style="margin-top:20px;">
                    <div class="stats-box">
                        <div class="label">Текущий вопрос</div>
                        <div class="value" id="statCurrent">1 / 1</div>
                    </div>
                    <div class="stats-box">
                        <div class="label">Отвечено</div>
                        <div class="value" id="statAnswered">0</div>
                    </div>
                    <div class="stats-box">
                        <div class="label">Осталось</div>
                        <div class="value" id="statLeft">0</div>
                    </div>
                </div>

                <div class="progress-wrap">
                    <div class="muted" id="progressText">Прогресс: 0%</div>
                    <div class="progress-bar">
                        <div class="progress-fill" id="progressFill"></div>
                    </div>
                </div>
            </div>

            <div class="question-card">
                <div class="top-row">
                    <h2 class="question-title" id="questionTitle"></h2>
                    <span class="badge ok hidden" id="selectedBadge">Ответ выбран</span>
                </div>
                <div id="optionsWrap"></div>
                <div id="feedbackBox" class="feedback hidden"></div>
                <div class="nav" style="margin-top:18px;">
                    <button class="secondary" id="prevBtn">Назад</button>
                    <button id="nextBtn">Далее</button>
                </div>
            </div>
        </div>

        <div id="resultScreen" class="hidden"></div>
    </div>

    <script>
        const BASE_QUESTIONS = [
            { id: 1, question: "Процессор имеет 16 разрядов шины адреса и 8 разрядов шины данных. Какой объем памяти адресуется?", options: ["16Kx8", "2Kx4", "8Kx4", "8Kx8", "64Kx8"], answer: 4, explanation: "2^16 = 64K адресов, каждый адрес хранит 8 бит данных → 64Kx8." },
            { id: 2, question: "Процессор имеет 11 разрядов шины адреса и 4 разряда шины данных. Какой объем памяти адресуется?", options: ["64Kx8", "8Kx4", "2Kx4", "11Kx4", "8Kx8"], answer: 2, explanation: "2^11 = 2048 = 2K адресов, ширина слова 4 бита → 2Kx4." },
            { id: 3, question: "Представить десятичное число 35 в двоичном коде:", options: ["111010", "100011", "111011", "110010", "101101"], answer: 1, explanation: "35 = 32 + 2 + 1 → 100011." },
            { id: 4, question: "Сколько адресных входов имеет микросхема памяти 256х4?", options: ["8", "11", "16", "13"], answer: 0, explanation: "256 = 2^8, значит нужно 8 адресных линий." },
            { id: 5, question: "Время выполнения команды определяется для CISC структуры:", options: ["количеством машинных циклов на команду;", "количеством машинных циклов на команду и количеством тактов на машинный цикл;", "видом тактового сигнала;", "количеством тактов на команду."], answer: 1, explanation: "Для CISC длительность зависит и от числа машинных циклов, и от числа тактов внутри цикла." },
            { id: 6, question: "Представить десятичное число 53 в двоичном коде:", options: ["110010", "110101", "101101", "101010", "100011"], answer: 1, explanation: "53 = 32 + 16 + 4 + 1 → 110101." },
            { id: 7, question: "Процессоры, в которых набор выполняемых команд сокращен до минимума, относятся к типу:", options: ["RISC-процессоры;", "Процессоры с Принстонской архитектурой;", "CISC-процессоры;", "Процессоры с Гарвардской архитектурой."], answer: 0, explanation: "RISC = Reduced Instruction Set Computer." },
            { id: 8, question: "Регистр признаков (флагов) микропроцессора ATmega32 не содержит биты:", options: ["Флаг переполнения дополнительного кода", "Флаг отрицательного значения", "Флаг знака", "Флаг переноса", "Общее разрешение прерываний", "Флаг нуля", "Флаг половинного переноса", "Флаг паритета", "Хранение копируемого бита"], answer: 7, explanation: "В SREG есть I, T, H, S, V, N, Z, C. Флага паритета в ATmega32 нет." },
            { id: 9, question: "После выполнения математической операции в регистре признаков SREG находится число A1hex. Это означает, что при выполнении операции:", options: ["получилось отрицательное число", "получился ноль", "результат в двоичном виде содержит нечетное количество единиц", "был перенос из младшей половины или заем из старшей половины байта", "произошел выход за границы байта"], answer: 4, explanation: "A1hex = 1010 0001: установлен флаг H и C, в том числе есть перенос за границы байта." },
            { id: 10, question: "Какая команда используется для возврата из программного прерывания?", options: ["команда безусловного перехода", "команда перехода с возвратом", "специальная команда возврата из прерывания", "команда вызова прерывания", "команда условного перехода"], answer: 2, explanation: "Для AVR используется специальная команда RETI." },
            { id: 11, question: "Что означает бит S в регистре признаков SREG микропроцессора ATmega32?", options: ["бит дополнительного переноса", "бит нуля", "бит паритета", "бит знака"], answer: 3, explanation: "S — Sign Flag, бит знака." },
            { id: 12, question: "Что означает бит Z в регистре признаков SREG микропроцессора ATmega32?", options: ["бит нуля", "бит паритета", "бит дополнительного переноса", "бит знака"], answer: 0, explanation: "Z — Zero Flag, флаг нуля." },
            { id: 13, question: "Стек — это:", options: ["основная вычислительная часть микропроцессора", "рабочая область данных", "устройство управления микропроцессора", "область памяти с последовательным доступом к данным"], answer: 3, explanation: "Стек — область памяти с доступом по принципу LIFO." },
            { id: 14, question: "Что называется «вектором прерывания» микроконтроллера?", options: ["адрес перехода к подпрограмме обработки прерывания", "состояние бита разрешения прерываний МК", "уровень приоритета данного типа прерывания", "состояние линии приема запросов на прерывание"], answer: 0, explanation: "Вектор прерывания — это адрес обработчика прерывания." },
            { id: 15, question: "Что отличает процессоры с RISC-архитектурой от процессоров с CISC-архитектурой?", options: ["способ обращения к памяти команд", "система команд", "тактовая частота", "возможность параллельного исполнения нескольких команд"], answer: 1, explanation: "Главное отличие — организация и сложность системы команд." },
            { id: 16, question: "Программа перевода из исходного текста в объектный код для МПС управления называется:", options: ["компилятор", "линковщик", "транслятор", "перекладчик"], answer: 2, explanation: "Общее название такой программы — транслятор." },
            { id: 17, question: "Какая структура шин адреса и данных обеспечивает большее быстродействие?", options: ["двунаправленная", "быстродействие от структуры не зависит", "мультиплексированная", "немультиплексированная"], answer: 3, explanation: "Немультиплексированные шины быстрее, так как адрес и данные передаются по разным линиям." },
            { id: 18, question: "Что такое операнд?", options: ["адрес команды", "адрес адреса данных", "адрес данных", "код команды", "код данных"], answer: 4, explanation: "Операнд — это данные, над которыми выполняется операция." },
            { id: 19, question: "Интерфейс — это:", options: ["совокупность линий, процедур и электрических схем, обеспечивающих обмен информацией между устройствами в системе", "совокупность линий, шин и сигналов обеспечивающие обмен информации между устройствами в системе", "совокупность линий, шин и процедур обеспечивающие обмен информации между устройствами в системе", "совокупность шин и электрических схем обеспечивающие обмен информации между устройствами в системе"], answer: 0, explanation: "Это стандарт взаимодействия устройств: линии, сигналы, процедуры и схемы." },
            { id: 20, question: "Какое излучение требуется для изменения содержимого памяти программ на основе ПЗУ типа Flash?", options: ["нейтронное", "рентгеновское", "ультрафиолетовое", "изменение информации производится электрическим способом"], answer: 3, explanation: "Flash-память перепрограммируется электрически." },
            { id: 21, question: "Микропроцессорная система какого типа не обеспечивает управление внешними устройствами?", options: ["компьютер", "микроконтроллер", "все типы обеспечивают управление", "контроллер"], answer: 2, explanation: "Управление внешними устройствами могут обеспечивать все перечисленные типы." },
            { id: 22, question: "К аппаратным средствам проектирования МПС не относится:", options: ["устройство чтения потока данных", "устройство записи программ", "внутрисхемный эмулятор", "логический анализатор"], answer: 0, explanation: "Остальные варианты — стандартные аппаратные средства разработки и отладки." },
            { id: 23, question: "Загрузчик — это:", options: ["программа, предназначенная для размещения объектов или исполняемых файлов в память системы для непосредственного их запуска или отладки"], answer: 0, explanation: "Это определение загрузчика." },
            { id: 24, question: "При какой минимальной тактовой частоте работы МК сохраняется информация в памяти данных?", options: ["не ниже 10 Гц", "вплоть до нулевой", "не ниже 1 МГц", "не ниже 32768 Гц"], answer: 1, explanation: "Статическая память данных сохраняет информацию даже при нулевой частоте." },
            { id: 25, question: "Какого типа трансляторов с ассемблерного языка программирования не существует?", options: ["метаассемблер", "2-х проходной", "макроассемблер", "3-х проходной"], answer: 3, explanation: "Типично выделяют одно-, двухпроходные, макро- и метаассемблеры." },
            { id: 26, question: "Каков типичный объем памяти данных (ОЗУ) микроконтроллера?", options: ["единицы бит", "десятки килобайт", "десятки и сотни байт", "мегабайты"], answer: 2, explanation: "Для классических МК типичны десятки и сотни байт, иногда единицы килобайт." },
            { id: 27, question: "Сколько адресных входов имеет микросхема памяти 2Kx8?", options: ["4", "8", "16", "11", "13"], answer: 3, explanation: "2K = 2048 = 2^11, значит 11 адресных входов." },
            { id: 28, question: "Интерфейс SPI:", options: ["трехпроводной синхронный", "двухпроводной асинхронный", "трехпроводной асинхронный", "двухпроводной синхронный"], answer: 0, explanation: "SPI — синхронный последовательный интерфейс; в тестах обычно его относят к трехпроводным." },
            { id: 29, question: "Отличие интерфейса RS-485 от RS-422:", options: ["Интерфейсы отличаются только средой передачи", "RS-485 не предусматривает z-состояния передатчиков", "RS-485 последовательный, а RS-422 — параллельный", "RS-422 последовательный, а RS-485 — параллельный", "RS-422 не предусматривает z-состояния передатчиков"], answer: 4, explanation: "Для многоточечной шины RS-485 передатчики могут переходить в высокоимпедансное состояние, в отличие от RS-422." },
            { id: 30, question: "Магистрально-модульный принцип построения МПС заключается в:", options: ["объединении всех устройств МПС шинами (магистралями) адреса/данных/управления"], answer: 0, explanation: "Это и есть суть магистрально-модульного принципа." },
            { id: 31, question: "Сколько адресных входов имеет микросхема памяти 8Kx8?", options: ["16", "11", "4", "8", "13"], answer: 4, explanation: "8K = 8192 = 2^13, значит 13 адресных входов." },
            { id: 32, question: "Процессор имеет 13 разрядов шины адреса и 8 разрядов шины данных. Какой объем памяти адресуется?", options: ["64Kx8", "13Kx8", "2Kx4", "8Kx8", "8Kx4"], answer: 3, explanation: "2^13 = 8K адресов, ширина слова 8 бит → 8Kx8." },
            { id: 33, question: "Адрес ячейки памяти в микропроцессоре ATmega32 состоит из:", options: ["16 байт", "4 байт", "8 байт", "1 байта", "2 байт"], answer: 4, explanation: "Адрес имеет ширину 16 бит, то есть 2 байта." },
            { id: 34, question: "Какие из перечисленных методов адресации отсутствуют в системе команд ATmega32?", options: ["непосредственная", "косвенно-регистровая", "прямая", "стековая", "регистровая", "автоинкрементная", "автодекрементная"], answer: 3, explanation: "В AVR есть непосредственная, регистровая, прямая, косвенная, автоинкремент и автодекремент; стековой адресации как отдельного режима нет." },
            { id: 35, question: "RISC-архитектура МП и МПС — это:", options: ["архитектура с сокращенным набором команд", "архитектура с набором сложных команд", "архитектура с использованием одного физически-логического адресного пространства для программ и данных", "архитектура построения МПС с использованием трех шин – адреса, данных и управления"], answer: 0, explanation: "RISC — архитектура с сокращённым набором команд." },
            { id: 36, question: "При возврате из подпрограммы адрес возврата берется из:", options: ["стека", "самой старшей ячейки памяти", "самой младшей ячейки памяти", "регистровой пары X, Y или Z"], answer: 0, explanation: "Адрес возврата сохраняется в стеке и затем извлекается командой возврата." },
            { id: 37, question: "Структуры фон Неймана и Гарвардская имеют следующие отличия:", options: ["в обоих память программ и данных объединены в одно адресное пространство", "в 1-ой память программ и данных объединены в одно адресное пространство, во 2-ой нет:", "в обоих память программ и данных разделены в разные адресные пространства", "во 2-ой память программы и данных объединены в одно адресное пространство, в 1-ой нет"], answer: 1, explanation: "Фон Нейман — общая память, Гарвард — раздельная." },
            { id: 38, question: "Сколько адресных входов имеет микросхема памяти 2Кх8", options: ["16", "13", "11", "4", "8"], answer: 2, explanation: "2K = 2^11 → 11 входов." },
            { id: 39, question: "Что такое микропроцессор", options: ["функционально законченное устройство цифровой обработки данных, выполненное в виде одной интегральной микросхема", "устройство получения, накопления и обработки данных", "цифровое устройство обработки данных", "отдельная интегральная микросхема для цифровой обработки данных, расположенная в микропроцессорной системе"], answer: 0, explanation: "Корректное определение — законченное устройство в виде ИС." },

            { id: 46, question: "При каких условиях триггер переполнения таймера/счетчика генерирует запрос на прерывание микроконтроллера?", options: ["При переполнении таймера/счетчика", "При сбросе запроса на прерывания", "При переполнении таймера/счетчика, если прерывания от таймера разрешены", "При сбросе таймера/счетчика"], answer: 2, explanation: "Прерывание возникает только если оно разрешено." },

            { id: 49, question: "Интерфейс RS-232C:", options: ["Не обеспечивает гальваническую развязку устройств", "Использует ТТЛ-сигналы", "Обеспечивает гальваническую развязку устройств", "Последовательный", "Использует двухполярные сигналы", "Параллельный"], answer: 3, explanation: "RS-232 — последовательный интерфейс." },
            { id: 50, question: "Сколько адресных входов имеет микросхема памяти 64Кх1?", options: ["13", "11", "4", "8", "16"], answer: 4, explanation: "64K = 2^16 → 16 входов." },
            { id: 52, question: "Микропроцессор ATmega32 является:", options: ["16-ти разрядным", "2-х разрядным", "4-х разрядным", "8-ми разрядным", "64-х разрядным", "32-ух разрядным", "1-но разрядным"], answer: 3, explanation: "ATmega32 — 8-битный микроконтроллер." },
            { id: 53, question: "Что происходит при переполнении сторожевого таймера микроконтроллера?", options: ["Сброс МК", "Формирование сигнала запроса прерывания", "Переход в режим пониженного энергопотребления", "Инкремент таймера/счетчика МК"], answer: 0, explanation: "Watchdog вызывает сброс." },
            { id: 54, question: "АЦП какого типа чаще всего используют в составе микроконтроллера?", options: ["На основе преобразователей напряжение-частота", "Последовательного приближения", "Параллельные", "Интегрирующие"], answer: 1, explanation: "Чаще всего SAR (successive approximation)." },
            { id: 55, question: "Какой метод адресации предполагает размещение операнда внутри выполняемой программы?", options: ["Абсолютная адресация", "Косвенная адресация", "Непосредственная адресация", "Операнд всегда находится внутри программы", "Регистровая адресация"], answer: 2, explanation: "Это непосредственная адресация." },
            { id: 56, question: "Что используется в качестве простейшего ЦАП на выходе микроконтроллера?", options: ["Операционный усилитель", "Усилитель напряжения", "Широтно-импульсный модулятор с фильтром нижних частот", "Электронный ключ"], answer: 2, explanation: "PWM + фильтр." },
            { id: 57, question: "Подсистема прерывания ATmega32 предназначена для:", options: ["Останова микропроцессора", "Реакции микропроцессора на желание периферийного устройства к обмену информацией", "Наискорейшей реакции микропроцессора на желание периферийного устройства к обмену информацией", "Обмена информацией с периферийным устройством"], answer: 2, explanation: "Прерывания — для быстрой реакции." },
            { id: 58, question: "При прямой (абсолютной) адресации операнд находится в:", options: ["Памяти непосредственно за кодом команды", "Внутреннем регистре процессора", "Памяти, а адрес ячейки памяти находится в регистре процессора", "Памяти по адресу, код которого находится внутри программы сразу за кодом команды"], answer: 3, explanation: "Адрес задаётся прямо в коде." },
            { id: 59, question: "Какой результат получится при выполнении команды AND над числами 01h и 10h?", options: ["0Bh", "01h", "FFh", "0Ah", "10h", "11h", "AEh", "00h"], answer: 7, explanation: "01 AND 10 = 00." },
            { id: 60, question: "Каково основное преимущество сегментирования памяти?", options: ["Сегментирование упрощает задание адреса операнда", "Сегментирование упрощает переключение между сегментами", "Сегментирование увеличивает быстродействие процессора", "Сегментирование позволяет увеличить объем памяти системы", "Сегментирование упрощает структура процессора"], answer: 3, explanation: "Позволяет расширить адресуемую память." },
            { id: 61, question: "Какое значение сигнала считывается при вводе данных с порта микроконтроллера?", options: ["Содержимое триггера данных", "Значение сигнала на внешнем выходе МК", "Логическое И над содержимым триггера данных и значением сигнала на внешнем выводе МК", "Содержимое триггера регистра управления"], answer: 1, explanation: "Читается фактический уровень на выводе." },
            { id: 62, question: "Укажите, какой тип данных составляют 4 бита", options: ["Слово", "Двойное слово", "Бит", "Тетрадка", "Учетверенное слово", "Байт"], answer: 3, explanation: "4 бита = тетрада." },
            { id: 63, question: "Укажите, какой тип данных составляют 32 бит", options: ["Слово", "Двойное слово", "Бит", "Тетрадка", "Учетверенное слово", "Байт"], answer: 1, explanation: "32 бита = двойное слово." }
        ];

        function shuffleArray(arr) {
            const copy = [...arr];
            for (let i = copy.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [copy[i], copy[j]] = [copy[j], copy[i]];
            }
            return copy;
        }

        let questions = [];
        let answers = {};
        let currentIndex = 0;
        let instantFeedback = true;

        const quizScreen = document.getElementById('quizScreen');
        const resultScreen = document.getElementById('resultScreen');
        const questionTitle = document.getElementById('questionTitle');
        const optionsWrap = document.getElementById('optionsWrap');
        const feedbackBox = document.getElementById('feedbackBox');
        const selectedBadge = document.getElementById('selectedBadge');
        const statCurrent = document.getElementById('statCurrent');
        const statAnswered = document.getElementById('statAnswered');
        const statLeft = document.getElementById('statLeft');
        const progressText = document.getElementById('progressText');
        const progressFill = document.getElementById('progressFill');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const resetBtn = document.getElementById('resetBtn');
        const shuffleBtn = document.getElementById('shuffleBtn');
        const toggleInstant = document.getElementById('toggleInstant');

        function initQuiz() {
            questions = shuffleArray(BASE_QUESTIONS).filter(q => q && q.id && q.question && Array.isArray(q.options));
            answers = {};
            currentIndex = 0;
            renderQuestion();
            quizScreen.classList.remove('hidden');
            resultScreen.classList.add('hidden');
        }

        function renderStats() {
            const answeredCount = questions.filter(q => answers[q.id] !== undefined).length;
            const percent = Math.round((answeredCount / questions.length) * 100);
            statCurrent.textContent = `${currentIndex + 1} / ${questions.length}`;
            statAnswered.textContent = answeredCount;
            statLeft.textContent = questions.length - answeredCount;
            progressText.textContent = `Прогресс: ${percent}%`;
            progressFill.style.width = `${percent}%`;
        }

        function renderQuestion() {
            const q = questions[currentIndex];
            if (!q) return;
            questionTitle.textContent = `${currentIndex + 1}. ${q.question}`;
            optionsWrap.innerHTML = '';
            const selected = answers[q.id];

            if (selected !== undefined) selectedBadge.classList.remove('hidden');
            else selectedBadge.classList.add('hidden');

            q.options.forEach((option, index) => {
                const label = document.createElement('label');
                label.className = 'option';

                if (instantFeedback && selected !== undefined) {
                    if (index === q.answer) label.classList.add('correct');
                    else if (index === selected && selected !== q.answer) label.classList.add('wrong');
                } else if (selected === index) {
                    label.classList.add('selected');
                }

                label.innerHTML = `<input type="radio" name="option" ${selected === index ? 'checked' : ''}>${option}`;
                label.addEventListener('click', () => {
                    answers[q.id] = index;
                    renderQuestion();
                    renderStats();
                });
                optionsWrap.appendChild(label);
            });

            if (instantFeedback && selected !== undefined) {
                const isCorrect = selected === q.answer;
                feedbackBox.className = `feedback ${isCorrect ? 'good' : 'bad'}`;
                feedbackBox.innerHTML = `
          <div><strong>${isCorrect ? 'Верно' : 'Неверно'}</strong></div>
          <div style="margin-top:8px;"><strong>Правильный ответ:</strong> ${q.options[q.answer]}</div>
          <div style="margin-top:8px;"><strong>Пояснение:</strong> ${q.explanation}</div>
        `;
                feedbackBox.classList.remove('hidden');
            } else {
                feedbackBox.classList.add('hidden');
            }

            prevBtn.disabled = currentIndex === 0;
            nextBtn.textContent = currentIndex === questions.length - 1 ? 'Завершить тест' : 'Далее';
            renderStats();
        }

        function renderResults(showOnlyMistakes = false) {
            const correctCount = questions.filter(q => answers[q.id] === q.answer).length;
            const mistakes = questions.filter(q => answers[q.id] !== undefined && answers[q.id] !== q.answer);
            const list = showOnlyMistakes ? mistakes : questions;

            resultScreen.innerHTML = `
        <div class="panel">
          <div class="top-row">
            <div>
              <h1>Результат теста</h1>
              <div class="muted">Ниже итог и разбор ошибок.</div>
            </div>
            <div class="actions">
              <button class="secondary" id="toggleMistakesBtn">${showOnlyMistakes ? 'Показать все' : 'Показать только ошибки'}</button>
              <button class="secondary" id="newRoundBtn">Новый раунд</button>
            </div>
          </div>
          <div class="stats" style="margin-top:20px;">
            <div class="stats-box"><div class="label">Всего вопросов</div><div class="value">${questions.length}</div></div>
            <div class="stats-box"><div class="label">Правильных ответов</div><div class="value">${correctCount}</div></div>
            <div class="stats-box"><div class="label">Ошибок</div><div class="value">${mistakes.length}</div></div>
          </div>
          <div style="margin-top:16px;" class="result-answer"><strong>Результат:</strong> ${correctCount} из ${questions.length}${correctCount === questions.length ? ' 🎉' : ''}</div>
        </div>
      `;

            if (showOnlyMistakes && mistakes.length === 0) {
                resultScreen.innerHTML += `<div class="result-card"><h3>Ошибок нет. Все ответы правильные.</h3></div>`;
            } else {
                list.forEach((q, idx) => {
                    const selected = answers[q.id];
                    const isCorrect = selected === q.answer;
                    const optionsHtml = q.options.map((option, i) => {
                        let cls = 'option';
                        if (i === q.answer) cls += ' correct';
                        else if (i === selected && selected !== q.answer) cls += ' wrong';
                        return `<div class="${cls}" style="cursor:default;">${option}</div>`;
                    }).join('');

                    resultScreen.innerHTML += `
            <div class="result-card">
              <div class="top-row">
                <h3>${idx + 1}. ${q.question}</h3>
                <span class="badge ${isCorrect ? 'ok' : 'err'}">${isCorrect ? 'Верно' : 'Ошибка'}</span>
              </div>
              ${optionsHtml}
              <div class="result-answer">
                <div><strong>Твой ответ:</strong> ${selected !== undefined ? q.options[selected] : 'нет ответа'}</div>
                <div><strong>Правильный ответ:</strong> ${q.options[q.answer]}</div>
                <div style="margin-top:8px;"><strong>Пояснение:</strong> ${q.explanation}</div>
              </div>
            </div>
          `;
                });
            }

            quizScreen.classList.add('hidden');
            resultScreen.classList.remove('hidden');

            document.getElementById('toggleMistakesBtn').onclick = () => renderResults(!showOnlyMistakes);
            document.getElementById('newRoundBtn').onclick = initQuiz;
        }

        prevBtn.addEventListener('click', () => {
            if (currentIndex > 0) {
                currentIndex--;
                renderQuestion();
            }
        });

        nextBtn.addEventListener('click', () => {
            if (currentIndex < questions.length - 1) {
                currentIndex++;
                renderQuestion();
            } else {
                renderResults(false);
            }
        });

        resetBtn.addEventListener('click', initQuiz);
        shuffleBtn.addEventListener('click', initQuiz);
        toggleInstant.addEventListener('click', () => {
            instantFeedback = !instantFeedback;
            toggleInstant.textContent = `Мгновенная проверка: ${instantFeedback ? 'вкл' : 'выкл'}`;
            renderQuestion();
        });

        initQuiz();
    </script>
